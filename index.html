<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>생극중학교 디지털 공지판</title>
<link rel="icon" href="data:,">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root{
    --navy:#2C5282; --gold:#B07D20; --burgundy:#9B3A4A;
    --ink:#6E6258; --muted:#9A8C7C; --card:#FFFFFF;
    --pill-bg:#FBEAC8; --pill-tx:#8A5A12;
    --disp:'Jua',sans-serif; --body:'Noto Sans KR',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:var(--body);height:100vh;overflow:hidden;user-select:none;color:var(--navy);background:#FBF3E2;}
  button,input{font:inherit;}

  #stage{height:100vh;display:flex;flex-direction:column;background:#FBF3E2;transition:background-color .9s ease;}
  #topbar{flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;padding:clamp(18px,3.4vh,40px) clamp(22px,4.5vw,64px) 0;}
  #brand{display:flex;align-items:center;gap:clamp(10px,1.3vw,16px);}
  #brandmark{width:clamp(42px,6.8vh,78px);height:clamp(42px,6.8vh,78px);border-radius:50%;display:grid;place-items:center;background:#fff;box-shadow:0 10px 30px rgba(120,98,70,.12);}
  #brandmark svg{width:74%;height:74%;}
  #brand .name-ko{font-family:var(--disp);color:var(--navy);font-size:clamp(1.3rem,3.6vw,2.6rem);line-height:1;}
  #brand .name-sub{font-size:clamp(.55rem,1.3vw,.95rem);letter-spacing:1px;color:var(--muted);margin-top:clamp(3px,.6vh,7px);}
  #clockwrap{text-align:right;line-height:1;}
  #clock{font-family:var(--disp);color:var(--navy);font-size:clamp(1.8rem,5.2vw,3.6rem);}
  #date{font-size:clamp(.8rem,1.9vw,1.4rem);color:var(--muted);margin-top:clamp(4px,.8vh,10px);}

  #mid{flex:1;position:relative;overflow:hidden;}
  #illust{position:absolute;right:-3vw;bottom:-2vh;width:clamp(260px,46vw,560px);height:auto;opacity:.2;mix-blend-mode:multiply;pointer-events:none;z-index:0;}
  .slide{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;padding:clamp(20px,3vh,56px) clamp(24px,6vw,90px);opacity:0;transform:scale(1.025);transition:opacity .9s ease,transform .9s ease;pointer-events:none;}
  .slide.active{opacity:1;transform:scale(1);pointer-events:auto;}
  .card{width:100%;max-width:min(86vw,860px);background:var(--card);border-radius:clamp(18px,2.6vw,30px);padding:clamp(26px,4vh,60px) clamp(28px,5vw,68px);text-align:center;box-shadow:0 18px 50px rgba(120,98,70,.10);display:flex;flex-direction:column;align-items:center;}
  .pill{display:inline-block;background:var(--pill-bg);color:var(--pill-tx);font-size:clamp(.72rem,1.6vw,1.05rem);font-weight:500;padding:clamp(5px,.9vh,9px) clamp(14px,1.8vw,22px);border-radius:999px;margin-bottom:clamp(12px,2vh,22px);}
  .title{font-family:var(--disp);color:var(--navy);font-size:clamp(1.7rem,6vw,4.2rem);line-height:1.18;word-break:keep-all;margin-bottom:clamp(10px,1.6vh,20px);}
  .content{font-size:clamp(1.35rem,3.5vw,3rem);line-height:1.7;color:var(--ink);white-space:pre-line;word-break:keep-all;max-width:94%;}
  .small{font-size:clamp(.9rem,1.8vw,1.2rem);line-height:1.6;color:var(--muted);white-space:pre-wrap;word-break:break-word;}
  .card img.slide-img{max-width:100%;max-height:58vh;object-fit:contain;border-radius:clamp(12px,1.8vw,20px);margin-top:clamp(8px,1.4vh,16px);}
  .slide.image-full{position:fixed;inset:0;z-index:60;padding:0;background:#fff;transform:none;}
  .slide.image-full.active{transform:none;}
  .slide.image-full .full-img{width:100%;height:100%;object-fit:cover;display:block;}
  #progress{position:absolute;left:0;bottom:0;height:4px;width:0%;background:var(--gold);z-index:3;border-radius:0 4px 4px 0;}

  #botbar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:clamp(14px,2vw,26px);padding:clamp(12px,2vh,22px) 0 clamp(14px,2.4vh,26px);}
  .navbtn{width:clamp(30px,4vw,40px);height:clamp(30px,4vw,40px);border-radius:50%;border:1.5px solid rgba(44,82,130,.25);background:transparent;color:var(--navy);font-size:clamp(.9rem,2vw,1.2rem);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .navbtn:hover{background:rgba(44,82,130,.08);border-color:rgba(44,82,130,.55);}
  #dots{display:flex;gap:clamp(6px,.8vw,9px);align-items:center;}
  .dot{height:clamp(6px,.8vh,8px);width:clamp(6px,.8vh,8px);border-radius:999px;background:rgba(176,125,32,.28);transition:all .4s ease;}
  .dot.active{background:var(--gold);width:clamp(20px,3vw,30px);}

  .setup,#overlay{position:fixed;inset:0;background:#FBF3E2;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem;padding:48px;text-align:center;color:var(--navy);font-family:var(--body);}
  .setup.show{display:flex;} #overlay{display:flex;} #overlay.hidden{display:none;}
  .badge{font-size:.75rem;letter-spacing:3px;background:var(--pill-bg);color:var(--pill-tx);border-radius:999px;padding:5px 18px;}
  .setup h2,#overlay h2{font-family:var(--disp);font-size:1.9rem;}
  .setup p,#overlay p{color:var(--ink);max-width:560px;line-height:1.7;font-size:.95rem;}
  .setup input{width:100%;max-width:520px;padding:14px 20px;border:1.5px solid rgba(44,82,130,.2);border-radius:14px;font-size:1rem;outline:none;font-family:var(--body);color:var(--navy);background:#fff;}
  .setup input:focus{border-color:var(--navy);}
  .btn{padding:13px 34px;background:var(--navy);color:#fff;border:none;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;font-family:var(--body);transition:opacity .2s,transform .1s;}
  .btn:hover{opacity:.9;} .btn:active{transform:scale(.97);}
  .btn-ghost{background:transparent;color:var(--navy);border:1.5px solid rgba(44,82,130,.25);font-weight:500;}
  .actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .spinner{width:42px;height:42px;border:3px solid rgba(44,82,130,.15);border-top-color:var(--navy);border-radius:50%;animation:spin .85s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion: reduce){#stage{transition:none}.slide{transition:opacity .3s ease;transform:none}.slide.active{transform:none}}
</style>
</head>
<body>

<div class="setup" id="screen-token">
  <div class="badge">초기 설정 1/2</div>
  <h2>노션 API 토큰</h2>
  <p>Internal Integration Token을 입력하세요. 토큰은 이 기기 브라우저에만 저장됩니다.</p>
  <input type="password" id="token-field" placeholder="ntn_xxxxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
  <button class="btn" onclick="saveToken()">다음</button>
</div>

<div class="setup" id="screen-db">
  <div class="badge">초기 설정 2/2</div>
  <h2>데이터베이스 ID</h2>
  <p>노션 공지 데이터베이스 URL에서 32자리 ID를 복사해 입력하세요.</p>
  <input type="text" id="db-field" placeholder="c93d77e7d5b848fab2f33cd9acb244af" autocomplete="off" />
  <button class="btn" onclick="saveDbId()">시작하기</button>
</div>

<div id="overlay">
  <div class="spinner"></div>
  <h2>공지사항을 불러오는 중</h2>
  <p id="loading-msg">노션과 급식 정보를 확인하고 있습니다.</p>
</div>

<div id="stage">
  <div id="topbar">
    <div id="brand">
      <div id="brandmark" aria-label="생극중학교">
        <svg viewBox="0 0 100 100" role="img" aria-hidden="true">
          <circle cx="50" cy="50" r="46" fill="#E6EEF7" stroke="#2C5282" stroke-width="6"/>
          <path d="M25 58 L50 26 L75 58" fill="none" stroke="#B07D20" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M33 68 Q50 78 67 68" fill="none" stroke="#9B3A4A" stroke-width="7" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="name-ko">생극중학교</div>
        <div class="name-sub">SAENGGEUK MIDDLE SCHOOL</div>
      </div>
    </div>
    <div id="clockwrap"><div id="clock">--:--</div><div id="date">----</div></div>
  </div>

  <div id="mid">
    <svg id="illust" viewBox="0 0 720 420" aria-hidden="true">
      <path d="M60 330 C150 270 250 270 350 330 C450 390 560 360 660 300" fill="none" stroke="#2C5282" stroke-width="18" stroke-linecap="round" opacity=".35"/>
      <path d="M120 300 L290 150 L470 300 Z" fill="#B07D20" opacity=".18"/>
      <path d="M170 300 L330 175 L540 300 Z" fill="#2C5282" opacity=".12"/>
      <rect x="150" y="300" width="420" height="60" rx="18" fill="#6E6258" opacity=".16"/>
    </svg>
    <div id="progress"></div>
  </div>

  <div id="botbar">
    <button class="navbtn" onclick="prevSlide()" aria-label="이전">&#8592;</button>
    <div id="dots"></div>
    <button class="navbtn" onclick="nextSlide()" aria-label="다음">&#8594;</button>
  </div>
</div>

<script>
  const SLIDE_DURATION = 20000;
  const REFRESH_INTERVAL = 60000;
  const REQUEST_TIMEOUT = 10000;
  const WORKER = 'https://notion-proxy.dongju1240.workers.dev';

  let slides = [], colors = [], currentIdx = 0, slideTimer = null, refreshTimer = null, progressAnim = null;
  const $ = id => document.getElementById(id);
  const store = {
    get:k=>{try{return localStorage.getItem(k)}catch(e){return null}},
    set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}},
    del:k=>{try{localStorage.removeItem(k)}catch(e){}}
  };

  const PASTEL = {파랑:'#E6EEF7', 빨강:'#FAE7E7', 노랑:'#FBF0D6', 초록:'#EAF1E4', 보라:'#EFEAF6', 회색:'#F0EEE9'};
  const CYCLE = ['#FBF3E2','#FBEBDD','#EAF1E4','#E6EEF7','#EFEAF6'];

  function showOverlay(message='노션과 급식 정보를 확인하고 있습니다.'){
    $('loading-msg').textContent = message;
    $('overlay').classList.remove('hidden');
  }
  function hideOverlay(){ $('overlay').classList.add('hidden'); }

  function saveToken(){
    const v = $('token-field').value.trim();
    if(!v.startsWith('secret_') && !v.startsWith('ntn_')){ alert('토큰 형식을 확인해주세요.'); return; }
    store.set('sgs_token', v);
    $('screen-token').classList.remove('show');
    $('screen-db').classList.add('show');
  }
  function saveDbId(){
    const m = $('db-field').value.trim().replace(/-/g,'').match(/[0-9a-f]{32}/i);
    if(!m){ alert('데이터베이스 ID를 다시 확인해주세요.'); return; }
    store.set('sgs_dbid', m[0]);
    $('screen-db').classList.remove('show');
    startApp();
  }
  function resetSetup(){ store.del('sgs_token'); store.del('sgs_dbid'); location.reload(); }

  async function fetchWithTimeout(url, options={}, timeout=REQUEST_TIMEOUT){
    const controller = new AbortController();
    const timer = setTimeout(()=>controller.abort(), timeout);
    try{
      return await fetch(url, {...options, signal:controller.signal, cache:'no-store'});
    }catch(err){
      if(err.name === 'AbortError') throw new Error(`요청 시간 초과: ${timeout/1000}초 안에 응답이 없습니다.`);
      throw err;
    }finally{ clearTimeout(timer); }
  }

  async function fetchJson(url, options={}){
    const res = await fetchWithTimeout(url, options);
    const text = await res.text();
    if(!res.ok) throw new Error(`HTTP ${res.status} ${text.slice(0,180)}`);
    try{ return JSON.parse(text); }
    catch(e){ throw new Error('서버 응답이 JSON 형식이 아닙니다. Worker 응답을 확인해주세요.'); }
  }

  async function fetchSlides(){
    const token = store.get('sgs_token'), dbId = store.get('sgs_dbid');
    if(!token) throw new Error('노션 토큰이 없습니다.');
    if(!dbId) throw new Error('데이터베이스 ID가 없습니다.');

    const data = await fetchJson(`${WORKER}?db=${encodeURIComponent(dbId)}&t=${Date.now()}`, {
      method:'GET',
      headers:{'x-notion-token':token}
    });

    return (data.results || []).map(p=>{
      const pr = p.properties || {};
      return {
        id:p.id || crypto.randomUUID?.() || String(Math.random()),
        title:readTitle(pr['제목']) || readRichText(pr['Title']) || readTitle(pr['Name']) || '',
        content:readRichText(pr['내용']) || readRichText(pr['Content']) || '',
        imageUrl:readUrl(pr['이미지URL']) || readUrl(pr['이미지']) || null,
        bgColor:readSelect(pr['배경색']) || readSelect(pr['색상']) || ''
      };
    }).filter(s=>s.title || s.content || s.imageUrl);
  }

  async function fetchMealSlide(){
    const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
    const ymd = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    const data = await fetchJson(`${WORKER}/meal?ymd=${ymd}&t=${Date.now()}`);
    if(!data.items || data.items.length === 0) return null;
    const kcal = data.kcal ? `\n\n열량 ${data.kcal} kcal` : '';
    return {id:'meal', title:`🍱 ${now.getMonth()+1}월 ${now.getDate()}일 오늘의 급식`, content:data.items.join('\n') + kcal, imageUrl:data.imgUrl || null, bgColor:'초록'};
  }

  function readTitle(p){ return p?.title?.map(x=>x.plain_text || '').join('') || ''; }
  function readRichText(p){ return p?.rich_text?.map(x=>x.plain_text || '').join('') || ''; }
  function readUrl(p){ return p?.url || p?.files?.[0]?.file?.url || p?.files?.[0]?.external?.url || ''; }
  function readSelect(p){ return p?.select?.name || p?.status?.name || ''; }
  function esc(t){ return String(t || '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function buildColors(arr){
    return arr.map((s,i)=>PASTEL[s.bgColor] || CYCLE[i % CYCLE.length]);
  }

  function errorSlide(err){
    return [{
      id:'error',
      title:'공지사항을 불러오지 못했습니다',
      content:`${err.message || err}\n\n확인할 것\n1. Cloudflare Worker CORS / OPTIONS 처리\n2. 노션 데이터베이스에 Integration 연결\n3. 토큰과 데이터베이스 ID\n\n화면이 멈추지 않도록 이 안내 슬라이드를 표시했습니다.`,
      bgColor:'빨강'
    }];
  }

  async function loadAll(){
    showOverlay();
    try{
      const results = await Promise.allSettled([fetchSlides(), fetchMealSlide()]);
      const notion = results[0];
      const meal = results[1];

      if(notion.status === 'rejected') throw notion.reason;

      let next = notion.value || [];
      if(meal.status === 'fulfilled' && meal.value) next = [meal.value, ...next];
      if(next.length === 0) next = [{id:'empty', title:'등록된 공지가 없습니다', content:'노션 데이터베이스에 공지를 추가하면 이곳에 표시됩니다.', bgColor:'노랑'}];
      renderSlides(next);
    }catch(err){
      console.error(err);
      renderSlides(errorSlide(err));
    }finally{
      hideOverlay();
    }
  }

  function renderSlides(data){
    slides = data;
    colors = buildColors(slides);
    currentIdx = Math.min(currentIdx, Math.max(0, slides.length-1));
    const mid = $('mid');
    mid.querySelectorAll('.slide').forEach(e=>e.remove());
    $('dots').innerHTML = '';

    slides.forEach((s,i)=>{
      const slide = document.createElement('div');
      slide.className = 'slide';
      const imageOnly = s.imageUrl && !s.title && !s.content;
      if(imageOnly){
        slide.classList.add('image-full');
        slide.innerHTML = `<img class="full-img" src="${esc(s.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none'">`;
      }else{
        slide.innerHTML = `<div class="card">
          <div class="pill">생극중학교 공지</div>
          ${s.title ? `<div class="title">${esc(s.title)}</div>` : ''}
          ${s.content ? `<div class="content">${esc(s.content)}</div>` : ''}
          ${s.imageUrl ? `<img class="slide-img" src="${esc(s.imageUrl)}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
          ${s.id === 'error' ? `<div class="actions" style="margin-top:22px"><button class="btn" onclick="loadAll()">다시 시도</button><button class="btn btn-ghost" onclick="resetSetup()">설정 초기화</button></div>` : ''}
        </div>`;
      }
      mid.insertBefore(slide, $('progress'));
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.onclick = ()=>goSlide(i);
      $('dots').appendChild(dot);
    });
    goSlide(currentIdx, true);
  }

  function goSlide(idx, immediate=false){
    if(!slides.length) return;
    currentIdx = (idx + slides.length) % slides.length;
    document.querySelectorAll('.slide').forEach((el,i)=>el.classList.toggle('active', i===currentIdx));
    document.querySelectorAll('.dot').forEach((el,i)=>el.classList.toggle('active', i===currentIdx));
    $('stage').style.backgroundColor = colors[currentIdx] || CYCLE[0];
    restartTimer(immediate);
  }
  function nextSlide(){ goSlide(currentIdx + 1); }
  function prevSlide(){ goSlide(currentIdx - 1); }

  function restartTimer(immediate=false){
    clearTimeout(slideTimer);
    if(progressAnim) progressAnim.cancel();
    const bar = $('progress');
    bar.style.width = '0%';
    progressAnim = bar.animate([{width:'0%'},{width:'100%'}], {duration:SLIDE_DURATION, easing:'linear', fill:'forwards'});
    if(slides.length > 1) slideTimer = setTimeout(nextSlide, immediate ? 250 : SLIDE_DURATION);
  }

  function updateClock(){
    const now = new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
    $('clock').textContent = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const days = ['일','월','화','수','목','금','토'];
    $('date').textContent = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
  }

  function startApp(){
    clearInterval(refreshTimer);
    updateClock();
    setInterval(updateClock, 1000);
    loadAll();
    refreshTimer = setInterval(loadAll, REFRESH_INTERVAL);
  }

  document.addEventListener('keydown', e=>{
    if(e.key === 'ArrowRight') nextSlide();
    if(e.key === 'ArrowLeft') prevSlide();
    if(e.key.toLowerCase() === 'r') loadAll();
    if(e.key.toLowerCase() === 's') resetSetup();
  });

  window.addEventListener('load', ()=>{
    if(!store.get('sgs_token')){ hideOverlay(); $('screen-token').classList.add('show'); return; }
    if(!store.get('sgs_dbid')){ hideOverlay(); $('screen-db').classList.add('show'); return; }
    startApp();
  });
</script>
</body>
</html>
