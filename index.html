<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생극중학교 디지털 공지판</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root{
    --navy:#2C5282; --gold:#B07D20; --burgundy:#9B3A4A;
    --ink:#6E6258; --muted:#9A8C7C; --card:#FFFFFF;
    --pill-bg:#FBEAC8; --pill-tx:#8A5A12;
    --disp:'Jua',sans-serif; --body:'Noto Sans KR',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--body);height:100vh;overflow:hidden;user-select:none;color:var(--navy);}

  #stage{height:100vh;display:flex;flex-direction:column;background:#FBF3E2;transition:background-color .9s ease;}

  #topbar{flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;
    padding:clamp(18px,3.4vh,40px) clamp(22px,4.5vw,64px) 0;}
  #brand{display:flex;align-items:center;gap:clamp(8px,1.2vw,14px);}
  #brand img{height:clamp(38px,6vh,72px);width:auto;object-fit:contain;}
  #brand .logo-round{border-radius:50%;}
  #brand .name-ko{font-family:var(--disp);color:var(--navy);font-size:clamp(1.3rem,3.6vw,2.6rem);line-height:1;}
  #brand .name-sub{font-size:clamp(.55rem,1.3vw,.95rem);letter-spacing:1px;color:var(--muted);margin-top:clamp(3px,.6vh,7px);}
  #clockwrap{text-align:right;line-height:1;}
  #clock{font-family:var(--disp);color:var(--navy);font-size:clamp(1.8rem,5.2vw,3.6rem);}
  #date{font-size:clamp(.8rem,1.9vw,1.4rem);color:var(--muted);margin-top:clamp(4px,.8vh,10px);}

  #mid{flex:1;position:relative;overflow:hidden;}
  #illust{position:absolute;right:0;bottom:0;width:clamp(260px,46vw,560px);height:auto;
    opacity:.3;mix-blend-mode:multiply;filter:grayscale(1);pointer-events:none;z-index:0;}

  .slide{position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;
    padding:clamp(20px,3vh,56px) clamp(24px,6vw,90px);
    opacity:0;transform:scale(1.025);transition:opacity .9s ease,transform .9s ease;pointer-events:none;}
  .slide.active{opacity:1;transform:scale(1);pointer-events:auto;}

  .card{width:100%;max-width:min(86vw,820px);background:var(--card);border-radius:clamp(18px,2.6vw,30px);
    padding:clamp(26px,4vh,60px) clamp(28px,5vw,68px);text-align:center;
    box-shadow:0 18px 50px rgba(120,98,70,.10);display:flex;flex-direction:column;align-items:center;}
  .pill{display:inline-block;background:var(--pill-bg);color:var(--pill-tx);
    font-size:clamp(.72rem,1.6vw,1.05rem);font-weight:500;
    padding:clamp(5px,.9vh,9px) clamp(14px,1.8vw,22px);border-radius:999px;margin-bottom:clamp(12px,2vh,22px);}
  .title{font-family:var(--disp);color:var(--navy);font-size:clamp(1.7rem,6vw,4.2rem);line-height:1.18;
    word-break:keep-all;margin-bottom:clamp(10px,1.6vh,20px);}
  .content{font-size:clamp(1.05rem,3vw,2rem);line-height:1.75;color:var(--ink);
    white-space:pre-line;word-break:keep-all;max-width:92%;}
  .card img.slide-img{max-width:100%;max-height:58vh;object-fit:contain;
    border-radius:clamp(12px,1.8vw,20px);margin-top:clamp(8px,1.4vh,16px);}
  .slide.image-full{position:fixed;inset:0;z-index:60;padding:0;background:#FFFFFF;transform:none;}
  .slide.image-full.active{transform:none;}
  .slide.image-full .full-img{width:100%;height:100%;object-fit:cover;display:block;}

  #progress{position:absolute;left:0;bottom:0;height:4px;width:0%;background:var(--gold);z-index:3;border-radius:0 4px 4px 0;}

  #botbar{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:clamp(14px,2vw,26px);
    padding:clamp(12px,2vh,22px) 0 clamp(14px,2.4vh,26px);}
  .navbtn{width:clamp(30px,4vw,40px);height:clamp(30px,4vw,40px);border-radius:50%;
    border:1.5px solid rgba(44,82,130,.25);background:transparent;color:var(--navy);
    font-size:clamp(.9rem,2vw,1.2rem);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .navbtn:hover{background:rgba(44,82,130,.08);border-color:rgba(44,82,130,.55);}
  .navbtn:active{transform:scale(.92);}
  #dots{display:flex;gap:clamp(6px,.8vw,9px);align-items:center;}
  .dot{height:clamp(6px,.8vh,8px);width:clamp(6px,.8vh,8px);border-radius:999px;
    background:rgba(176,125,32,.28);transition:all .4s ease;}
  .dot.active{background:var(--gold);width:clamp(20px,3vw,30px);}

  .setup,#overlay{position:fixed;inset:0;background:#FBF3E2;z-index:100;
    display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:1.3rem;padding:48px;text-align:center;color:var(--navy);font-family:var(--body);}
  .setup.show{display:flex;} #overlay{display:flex;} #overlay.hidden{display:none;}
  .badge{font-size:.75rem;letter-spacing:3px;background:var(--pill-bg);color:var(--pill-tx);border-radius:999px;padding:5px 18px;}
  .setup h2{font-family:var(--disp);font-size:1.9rem;}
  .setup p{color:var(--ink);max-width:480px;line-height:1.7;font-size:.95rem;}
  .setup input{width:100%;max-width:480px;padding:14px 20px;border:1.5px solid rgba(44,82,130,.2);
    border-radius:14px;font-size:1rem;outline:none;font-family:var(--body);color:var(--navy);background:#fff;}
  .setup input:focus{border-color:var(--navy);}
  .setup input::placeholder{color:var(--muted);font-size:.88rem;}
  .btn{padding:13px 38px;background:var(--navy);color:#fff;border:none;border-radius:14px;
    font-size:1rem;font-weight:700;cursor:pointer;font-family:var(--body);transition:opacity .2s,transform .1s;}
  .btn:hover{opacity:.9;} .btn:active{transform:scale(.97);}
  .btn-ghost{background:transparent;color:var(--navy);border:1.5px solid rgba(44,82,130,.25);font-weight:500;}
  .spinner{width:42px;height:42px;border:3px solid rgba(44,82,130,.15);border-top-color:var(--navy);
    border-radius:50%;animation:spin .85s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (prefers-reduced-motion: reduce){
    #stage{transition:none;} .slide{transition:opacity .3s ease;transform:none;} .slide.active{transform:none;}
  }
</style>
</head>
<body>

<div class="setup" id="screen-token">
  <div class="badge">초기 설정 1/2</div>
  <h2>노션 API 토큰</h2>
  <p>notion.so → 설정 → <strong>내 연동</strong> → <strong>새 연동 만들기</strong>에서 Internal Integration Token을 발급해 입력하세요.</p>
  <input type="password" id="token-field" placeholder="ntn_xxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
  <button class="btn" onclick="saveToken()">다음</button>
  <p style="font-size:.78rem;color:var(--muted);">토큰은 이 기기 브라우저에만 저장됩니다</p>
</div>

<div class="setup" id="screen-db">
  <div class="badge">초기 설정 2/2</div>
  <h2>데이터베이스 ID</h2>
  <p>노션에서 공지 슬라이드 목록 데이터베이스를 열고, 주소창 URL의 마지막 32자리를 복사해 입력하세요.</p>
  <input type="text" id="db-field" placeholder="c93d77e7d5b848fab2f33cd9acb244af" />
  <button class="btn" onclick="saveDbId()">시작하기</button>
</div>

    <div id="overlay">
      <div class="spinner" id="spinner"></div>
      <p id="overlay-msg" style="color:var(--ink);">노션에서 공지사항을 불러오는 중...</p>
      <h2 id="overlay-title" style="display:none;font-family:var(--disp);"></h2>
      <p id="overlay-detail" style="display:none;color:var(--muted);max-width:420px;line-height:1.6;font-size:.85rem;"></p>
      <div id="overlay-btns" style="display:none;flex-direction:column;align-items:center;gap:10px;margin-top:.4rem;">
        <button class="btn" onclick="startApp()" style="padding:11px 30px;font-size:.9rem;">다시 시도</button>
        <button class="btn btn-ghost" onclick="resetSetup()">설정 초기화</button>
      </div>
    </div>
    <div id="progress"></div>
  </div>

  <div id="botbar">
    <button class="navbtn" onclick="prevSlide()">&#8592;</button>
    <div id="dots"></div>
    <button class="navbtn" onclick="nextSlide()">&#8594;</button>
  </div>
</div>

<script>
  const SLIDE_DURATION = (typeof window!=='undefined' && window.__DEMO_DURATION__) ? window.__DEMO_DURATION__ : 20000;
  const REFRESH_INTERVAL = 60000;
  const WORKER = 'https://notion-proxy.dongju1240.workers.dev';
  const DEMO = (typeof window!=='undefined' && window.__DEMO__) ? window.__DEMO__ : null;
  let slides=[], colors=[], currentIdx=0, slideTimer=null, refreshTimer=null;
  const $ = id => document.getElementById(id);

  const PASTEL = {파랑:'#E6EEF7', 빨강:'#FAE7E7', 노랑:'#FBF0D6', 초록:'#EAF1E4', 보라:'#EFEAF6', 회색:'#F0EEE9'};
  const CYCLE = ['#FBF3E2','#FBEBDD','#EAF1E4','#E6EEF7','#EFEAF6'];

  function buildColors(arr){
    const out=[];
    for(let i=0;i<arr.length;i++){
      let c = PASTEL[arr[i].bgColor] || CYCLE[i % CYCLE.length];
      if(i>0 && c===out[i-1]){
        for(let k=1;k<=CYCLE.length;k++){ const a=CYCLE[(i+k)%CYCLE.length]; if(a!==out[i-1]){c=a;break;} }
      }
      out.push(c);
    }
    if(out.length>2 && out[out.length-1]===out[0]){
      for(let k=1;k<=CYCLE.length;k++){ const a=CYCLE[k%CYCLE.length]; if(a!==out[0]&&a!==out[out.length-2]){out[out.length-1]=a;break;} }
    }
    return out;
  }

  const store={get:k=>{try{return localStorage.getItem(k)}catch(e){return null}},
    set:(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}},
    del:k=>{try{localStorage.removeItem(k)}catch(e){}}};

  function saveToken(){
    const v=$('token-field').value.trim();
    if(!v.startsWith('secret_')&&!v.startsWith('ntn_')){alert('토큰 형식을 확인해주세요.');return;}
    store.set('sgs_token',v); $('screen-token').classList.remove('show'); $('screen-db').classList.add('show');
  }
  function saveDbId(){
    let v=$('db-field').value.trim().replace(/-/g,''); const m=v.match(/[0-9a-f]{32}/i);
    if(!m){alert('데이터베이스 ID를 다시 확인해주세요.');return;}
    store.set('sgs_dbid',m[0]); $('screen-db').classList.remove('show'); startApp();
  }
  function resetSetup(){store.del('sgs_token');store.del('sgs_dbid');location.reload();}

  async function fetchSlides(){
    const token=store.get('sgs_token'), dbId=store.get('sgs_dbid');
    const res=await fetch(`${WORKER}?db=${dbId}`,{method:'GET',headers:{'x-notion-token':token}});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    return (data.results||[]).map(p=>{
      const pr=p.properties;
      return {id:p.id,
        title:pr['제목']?.title?.[0]?.plain_text||'',
        content:pr['내용']?.rich_text?.[0]?.plain_text||'',
        imageUrl:pr['이미지URL']?.url||null,
        bgColor:pr['배경색']?.select?.name||''};
    });
  }

  async function fetchMealSlide(){
    const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
    const ymd=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    const res=await fetch(`${WORKER}/meal?ymd=${ymd}`);
    if(!res.ok) return null;
    const data=await res.json();
    if(!data.items||data.items.length===0) return null;
    const kcal = data.kcal ? `\n\n열량 ${data.kcal} kcal` : '';
    return {id:'meal', title:`🍱 ${now.getMonth()+1}월 ${now.getDate()}일 오늘의 급식`,
      content:data.items.join('\n')+kcal, imageUrl:data.imgUrl||null, bgColor:'초록'};
  }

  function esc(t){return String(t).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

  function renderSlides(data){
    slides=data; colors=buildColors(slides);
    const mid=$('mid'); mid.querySelectorAll('.slide').forEach(e=>e.remove());
    const dots=$('dots'); dots.innerHTML='';
    slides.forEach((s,i)=>{
      const slide=document.createElement('div'); slide.className='slide';
      const imageOnly = s.imageUrl && !s.title && !s.content;
      if(imageOnly){
        slide.classList.add('image-full');
        slide.innerHTML = `<img class="full-img" src="${s.imageUrl}" alt="" loading="lazy" onerror="this.style.display='none'">`;
      } else {
        const card=document.createElement('div'); card.className='card';
        card.innerHTML = `
          <div class="pill">생극중학교 공지</div>
          ${s.title?`<div class="title">${esc(s.title)}</div>`:''}
          ${s.content?`<div class="content">${esc(s.content)}</div>`:''}
          ${s.imageUrl?`<img class="slide-img" src="${s.imageUrl}" alt="" loading="lazy" onerror="this.style.display='none'">`:''}`;
        slide.appendChild(card);
      }
      mid.insertBefore(slide,$('progress'));
      const d=document.createElement('div'); d.className='dot'; dots.appendChild(d);
    });
    showSlide(0);
  }

  function showSlide(idx){
    if(!slides.length) return;
    currentIdx=((idx%slides.length)+slides.length)%slides.length;
    $('stage').style.backgroundColor = colors[currentIdx] || '#FBF3E2';
    document.querySelectorAll('.slide').forEach((e,i)=>e.classList.toggle('active',i===currentIdx));
    document.querySelectorAll('.dot').forEach((e,i)=>e.classList.toggle('active',i===currentIdx));
    animateProgress();
    clearTimeout(slideTimer);
    slideTimer=setTimeout(()=>showSlide(currentIdx+1),SLIDE_DURATION);
  }
  function animateProgress(){
    const b=$('progress'); b.style.transition='none'; b.style.width='0%';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ b.style.transition=`width ${SLIDE_DURATION}ms linear`; b.style.width='100%'; }));
  }
  function prevSlide(){clearTimeout(slideTimer);showSlide(currentIdx-1);}
  function nextSlide(){clearTimeout(slideTimer);showSlide(currentIdx+1);}

  async function startApp(){
    $('overlay').classList.remove('hidden');
    $('spinner').style.display='block'; $('overlay-msg').style.display='block';
    $('overlay-msg').textContent='공지사항을 불러오는 중...';
    $('overlay-title').style.display='none'; $('overlay-detail').style.display='none'; $('overlay-btns').style.display='none';
    try{
      const [notionData,mealSlide]=await Promise.all([fetchSlides(),fetchMealSlide().catch(()=>null)]);
      let all=[...notionData]; if(mealSlide) all.unshift(mealSlide);
      if(!all.length){showError('표시할 슬라이드 없음','노션 데이터베이스에서 "표시" 체크박스를 켜주세요.');return;}
      $('overlay').classList.add('hidden'); renderSlides(all);
    }catch(e){
      showError('데이터를 불러오지 못했어요',`${e.message}\n\n노션 Integration이 데이터베이스에 연결되어 있는지 확인하세요.`);
    }
    clearTimeout(refreshTimer);
    refreshTimer=setTimeout(async()=>{
      try{
        const [notionData,mealSlide]=await Promise.all([fetchSlides(),fetchMealSlide().catch(()=>null)]);
        let all=[...notionData]; if(mealSlide) all.unshift(mealSlide);
        if(all.length) renderSlides(all);
      }catch(e){}
      startApp();
    },REFRESH_INTERVAL);
  }
  function showError(t,d){
    $('spinner').style.display='none'; $('overlay-msg').style.display='none';
    $('overlay-title').style.display='block'; $('overlay-title').textContent=t;
    $('overlay-detail').style.display='block'; $('overlay-detail').textContent=d;
    $('overlay-btns').style.display='flex';
  }

  function updateClock(){
    const n=new Date(), days=['일','월','화','수','목','금','토'];
    let h=n.getHours(); const ap=h<12?'오전':'오후'; let hh=h%12; if(hh===0)hh=12;
    const mm=String(n.getMinutes()).padStart(2,'0');
    $('clock').textContent=`${ap} ${hh}:${mm}`;
    $('date').textContent=`${n.getMonth()+1}월 ${n.getDate()}일 ${days[n.getDay()]}요일`;
  }
  setInterval(updateClock,1000); updateClock();

  if(DEMO){ $('overlay').classList.add('hidden'); renderSlides(DEMO); }
  else if(!store.get('sgs_token')) $('screen-token').classList.add('show');
  else if(!store.get('sgs_dbid')) $('screen-db').classList.add('show');
  else startApp();
</script>
</body>
</html>
